<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader-lock">
    <title>Document</title>
    <link rel="stylesheet" href="{{url_for('static',filename='css/navigation.css')}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/background.css')}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/forms.css')}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/index.css')}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/archive.css')}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/home.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <style>
        html{
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }

        :root{
            --green-color: #7CFC00;
            --dark_green-color: #50C878;
            --grey-color: #333333; 
            --main-border: 4px solid black;

        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

</head>
<body>

    <div id="minicircle"></div>

    <div id="navbar">

        <nav id="nav_box">

            <div id="navbar_brand" >
                <a href="#" id="navbar_brand">[lime]</a>
            </div>
            <ul id="nav_items">
                <li  id="nav_contents">
                    <a href="{{url_for('main.home')}}" class="nav_links {% if request.endpoint == 'main.home' %}active-green{% endif %}">HOME</a>
                </li>
                <li id="nav_contents">
                    <a href="{{url_for('main.archive')}}" class="nav_links {% if request.endpoint == 'main.archive' %}active-green{% endif %}">GENERATE</a>
                </li>
                <li id="nav_contents">
                    {% if current_user.is_authenticated %}
                        <a href="{{url_for('main.logout')}}" class="nav_links">SIGN OUT</a>
                    {% else %}
                        <a href="{{url_for('main.SignIn')}}" class="nav_links {% if request.endpoint == 'main.SignIn' %}active-green{% endif %}">SIGN IN</a>
                    {% endif %}
                </li>
            </ul>



        </nav>

    </div>
        

    


    
        <div id="FORM" class="content-wrapper">
        {% block content%}
    
        {% endblock content %}
        </div>
    

    


    

    <script src="{{url_for('static', filename='js/main.js')}}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>

</body>
</html>
