<script src="api.js"></script>
<script>
    async function loadUserProfile() {
        try {
            const profile = await api.getUserProfile();
            document.getElementById('profile-name').innerText = profile.username || "Unknown User";
            document.getElementById('profile-handle').innerText = profile.username ? `@${profile.username}` : "";
            
            const bioElement = document.getElementById('profile-bio');
            if (profile.Bio) {
                bioElement.innerText = profile.Bio;
            } else {
                bioElement.innerText = "No bio yet.";
            }
            document.getElementById('edit-bio-btn').classList.remove('hidden');

            if (profile.image_file && profile.image_file !== 'default.jpg') {
                const imgUrl = `${API_URL}/static/profile_pics/${profile.image_file}`;
                const picImg = document.getElementById('profile-pic-img');
                const picIcon = document.getElementById('profile-pic-icon');
                if (picImg && picIcon) {
                    picImg.src = imgUrl;
                    picImg.classList.remove('hidden');
                    picIcon.classList.add('hidden');
                }
            }
        } catch (err) {
            console.error("Failed to load profile:", err);
            document.getElementById('profile-name').innerText = "Unknown User";
            document.getElementById('profile-handle').innerText = "";
            if (document.getElementById('profile-bio')) document.getElementById('profile-bio').innerText = "";
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const picContainer = document.getElementById('profile-pic-container');
        const picInput = document.getElementById('profile-pic-input');
        
        if (picContainer && picInput) {
            picContainer.addEventListener('click', () => picInput.click());
            picInput.addEventListener('change', async (e) => {
                if (e.target.files && e.target.files[0]) {
                    const file = e.target.files[0];
                    try {
                        const data = await api.uploadProfilePicture(file);
                        const imgUrl = `${API_URL}/static/profile_pics/${data.image_file}`;
                        document.getElementById('profile-pic-img').src = imgUrl;
                        document.getElementById('profile-pic-img').classList.remove('hidden');
                        document.getElementById('profile-pic-icon').classList.add('hidden');
                    } catch (err) {
                        alert("Failed to upload picture: " + err.message);
                    }
                }
            });
        }

        const editBioBtn = document.getElementById('edit-bio-btn');
        if (editBioBtn) {
            editBioBtn.addEventListener('click', () => {
                document.getElementById('profile-bio').classList.add('hidden');
                document.getElementById('edit-bio-btn').classList.add('hidden');
                document.getElementById('edit-bio-container').classList.remove('hidden');
                const currentBio = document.getElementById('profile-bio').innerText;
                document.getElementById('bio-input').value = currentBio === "No bio yet." ? "" : currentBio;
            });
        }

        const cancelBioBtn = document.getElementById('cancel-bio-btn');
        if (cancelBioBtn) {
            cancelBioBtn.addEventListener('click', () => {
                document.getElementById('profile-bio').classList.remove('hidden');
                document.getElementById('edit-bio-btn').classList.remove('hidden');
                document.getElementById('edit-bio-container').classList.add('hidden');
            });
        }

        const saveBioBtn = document.getElementById('save-bio-btn');
        if (saveBioBtn) {
            saveBioBtn.addEventListener('click', async () => {
                const newBio = document.getElementById('bio-input').value.trim();
                try {
                    await api.updateProfile(newBio);
                    document.getElementById('profile-bio').innerText = newBio || "No bio yet.";
                    document.getElementById('profile-bio').classList.remove('hidden');
                    document.getElementById('edit-bio-btn').classList.remove('hidden');
                    document.getElementById('edit-bio-container').classList.add('hidden');
                } catch (e) {
                    alert("Failed to update bio: " + e.message);
                }
            });
        }
    });

    async function loadUserPosts() {
        const postsContainer = document.getElementById('user-posts-container');
        try {
            const data = await api.fetchPosts();
            if (!data.posts || data.posts.length === 0) {
                postsContainer.innerHTML = '<p class="text-on-surface-variant text-center mt-10">No posts available.</p>';
                return;
            }

            const currentUserId = String(api.getUserId());
            const userPosts = data.posts.filter(p => String(p.user_id) === currentUserId);

            if (userPosts.length === 0) {
                postsContainer.innerHTML = '<p class="text-on-surface-variant text-center mt-10">You have not created any posts.</p>';
                return;
            }

            postsContainer.innerHTML = ''; 
            userPosts.forEach(post => {
                const postHtml = `
                <article class="bg-surface-container-lowest rounded-xl p-6 border border-outline-variant/10 shadow-sm hover:shadow-md transition-shadow duration-300">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-8 h-8 rounded-full bg-primary-fixed-dim flex items-center justify-center text-primary font-bold text-xs">${post.author ? post.author.substring(0,2).toUpperCase() : 'U'}</div>
                        <div>
                            <p class="text-sm font-bold flex items-center gap-2">
                                u/${post.author || 'unknown'}
                                <span class="text-[10px] text-on-surface-variant font-normal opacity-60">Posted on ${post.date_posted}</span>
                            </p>
                        </div>
                    </div>
                    <h2 class="font-headline text-2xl font-bold mb-3 text-on-surface leading-snug">${post.title}</h2>
                    <p class="font-body text-on-surface-variant mb-6 line-clamp-3 leading-relaxed">
                        ${post.content}
                    </p>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <button onclick="window.location.href='edit_post.html?id=${post.id}'" class="flex items-center gap-2 text-primary hover:bg-primary/10 px-3 py-1.5 rounded-lg transition-colors text-sm font-bold">
                                <span class="material-symbols-outlined text-lg">edit</span>
                                Edit
                            </button>
                            <button onclick="deletePost(${post.id})" class="flex items-center gap-2 text-error hover:bg-error/10 px-3 py-1.5 rounded-lg transition-colors text-sm font-bold">
                                <span class="material-symbols-outlined text-lg">delete</span>
                                Delete
                            </button>
                        </div>
                    </div>
                </article>`;
                postsContainer.insertAdjacentHTML('beforeend', postHtml);
            });
        } catch (err) {
            postsContainer.innerHTML = `<p class="text-error text-center mt-10">Error loading posts: ${err.message}</p>`;
        }
    }

    async function deletePost(id) {
        if(!confirm("Are you sure you want to delete this post?")) return;
        try {
            await api.deletePost(id);
            loadUserPosts();
        } catch (err) {
            alert("Could not delete post: " + err.message);
        }
    }

    if (api.isLoggedIn()) {
        loadUserProfile();
        loadUserPosts();
    } else {
        window.location.href = 'auth.html';
    }
</script>
<script>
        // Simple fade-in effect on load
        document.addEventListener('DOMContentLoaded', () => {
            const items = document.querySelectorAll('article');
            items.forEach((item, index) => {
                item.style.opacity = '0';
                item.style.transform = 'translateY(20px)';
                item.style.transition = `all 0.5s ease ${index * 0.1}s`;
                
                setTimeout(() => {
                    item.style.opacity = '1';
                    item.style.transform = 'translateY(0)';
                }, 50);
            });
        });

        // Tab Switching micro-interaction (Visual only)
        const tabs = document.querySelectorAll('.flex.gap-8 button');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('text-primary', 'font-bold', 'border-b-2', 'border-primary');
                    t.classList.add('text-on-surface-variant', 'font-medium');
                });
                tab.classList.remove('text-on-surface-variant', 'font-medium');
                tab.classList.add('text-primary', 'font-bold', 'border-b-2', 'border-primary');
            });
        });
    </script>
</body></html>
