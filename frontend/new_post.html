<main class="min-h-screen pt-8 pb-24 px-6">
<div class="distraction-free-container">
<!-- Header Section -->

<div>
<h1 class="text-4xl font-bold text-on-surface mb-2">Create Post</h1>
<p class="text-on-surface-variant text-lg">Share your thoughts with the Lime community.</p>
</div>
<!-- Community Selection -->
<div class="relative group">
<label class="block text-xs font-bold text-primary uppercase tracking-widest mb-1.5 ml-1">Posting to</label>
<button class="flex items-center gap-3 bg-surface-container-low border border-outline-variant/30 hover:border-primary/50 px-4 py-2.5 rounded-xl transition-all duration-300 w-full md:w-56 text-left" id="communitySelect">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">eco</span>
<span class="flex-1 font-medium text-on-surface">Sustainable Living</span>
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</button>
<!-- Dropdown (Hidden by default) -->
<div class="hidden absolute top-full left-0 right-0 mt-2 bg-surface-container-lowest border border-outline-variant/20 shadow-xl rounded-xl z-10 overflow-hidden animate-in fade-in slide-in-from-top-2 duration-200">
<div class="p-2 space-y-1">
<button class="flex items-center gap-3 w-full p-3 hover:bg-surface-variant/30 rounded-lg text-left transition-colors">
<span class="material-symbols-outlined text-tertiary">forest</span>
<div>
<div class="font-bold text-sm">Forestry &amp; Fauna</div>
<div class="text-xs text-on-surface-variant">12.4k members</div>
</div>
</button>
<button class="flex items-center gap-3 w-full p-3 bg-primary-container/10 border border-primary/20 rounded-lg text-left transition-colors">
<span class="material-symbols-outlined text-primary">eco</span>
<div>
<div class="font-bold text-sm">Sustainable Living</div>
<div class="text-xs text-on-surface-variant">45k members</div>
</div>
</button>
<button class="flex items-center gap-3 w-full p-3 hover:bg-surface-variant/30 rounded-lg text-left transition-colors">
<span class="material-symbols-outlined text-secondary">outdoor_grill</span>
<div>
<div class="font-bold text-sm">Organic Cooking</div>
<div class="text-xs text-on-surface-variant">8.2k members</div>
</div>
</button>
</div>
</div>
</div>
</header>
<!-- Editor Surface -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 overflow-hidden mb-8 transition-shadow hover:shadow-md duration-500">
<!-- Toolbar -->
<div class="flex items-center gap-1 p-2 border-b border-outline-variant/20 bg-surface-container-low/50">
<button type="button" onclick="applyMarkdown('**', '**', 'bold text')" class="p-2 rounded-lg hover:bg-surface-variant transition-colors" title="Bold"><span class="material-symbols-outlined text-on-surface-variant">format_bold</span></button>
<button type="button" onclick="applyMarkdown('*', '*', 'italic text')" class="p-2 rounded-lg hover:bg-surface-variant transition-colors" title="Italic"><span class="material-symbols-outlined text-on-surface-variant">format_italic</span></button>
<button type="button" onclick="applyMarkdown('### ', '', 'Heading')" class="p-2 rounded-lg hover:bg-surface-variant transition-colors" title="Font Size/Heading"><span class="material-symbols-outlined text-on-surface-variant">format_size</span></button>
<button type="button" onclick="applyMarkdown('- ', '', 'list item')" class="p-2 rounded-lg hover:bg-surface-variant transition-colors" title="List"><span class="material-symbols-outlined text-on-surface-variant">format_list_bulleted</span></button>
<button type="button" onclick="applyMarkdown('> ', '', 'quote')" class="p-2 rounded-lg hover:bg-surface-variant transition-colors" title="Quote"><span class="material-symbols-outlined text-on-surface-variant">format_quote</span></button>
<div class="w-px h-6 bg-outline-variant/30 mx-1"></div>
<button type="button" onclick="applyMarkdown('[', '](url)', 'link text')" class="p-2 rounded-lg hover:bg-surface-variant transition-colors" title="Link"><span class="material-symbols-outlined text-on-surface-variant">link</span></button>
<button type="button" onclick="applyMarkdown('![', '](image-url)', 'image alt')" class="p-2 rounded-lg hover:bg-surface-variant transition-colors" title="Image"><span class="material-symbols-outlined text-on-surface-variant">image</span></button>
<div class="flex-grow"></div>
<button type="button" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-bold text-on-surface-variant hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-sm">visibility</span>
                        Preview
                    </button>

</div>
</div>
<!-- Action Area -->
<div class="flex items-center justify-end gap-4">

</button>

</div>

<div class="flex items-center gap-1"><kbd class="bg-surface px-1.5 py-0.5 rounded border border-outline-variant/40">Ctrl</kbd> + <kbd class="bg-surface px-1.5 py-0.5 rounded border border-outline-variant/40">B</kbd> Bold</div>
<div class="w-px h-3 bg-outline-variant/30"></div>
<div class="flex items-center gap-1"><kbd class="bg-surface px-1.5 py-0.5 rounded border border-outline-variant/40">Ctrl</kbd> + <kbd class="bg-surface px-1.5 py-0.5 rounded border border-outline-variant/40">Enter</kbd> Publish</div>
</div>
</footer>
<script src="api.js"></script>
<script>
        function applyMarkdown(prefix, suffix, defaultText) {
            const editor = document.getElementById('editor');
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            
            let selectedText = text.substring(start, end);
            if (!selectedText) selectedText = defaultText;
            
            const before = text.substring(0, start);
            const after = text.substring(end);
            
            editor.value = before + prefix + selectedText + suffix + after;
            
            // Restore selection
            editor.focus();
            editor.selectionStart = start + prefix.length;
            editor.selectionEnd = start + prefix.length + selectedText.length;
            
            // Update counts if necessary
            if(typeof updateWordCount === 'function') updateWordCount(editor);
        }

        document.getElementById('publish-btn').addEventListener('click', async () => {
            const titleInput = document.querySelector('input[type="text"]');
            const editor = document.getElementById('editor');
            const title = titleInput.value.trim();
            const content = editor.value.trim();

            if (!title) {
                alert('Title is required.');
                return;
            }

            if (content.length < 50) {
                alert('Post content must be at least 50 characters long.');
                return;
            }

            try {
                await api.createPost(title, content);
                window.location.href = 'index.html';
            } catch (error) {
                alert(error.message);
            }
        });

        function updateWordCount(textarea) {
            const text = textarea.value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            const chars = text.length;
            
            document.getElementById('wordCount').innerText = `${words} word${words === 1 ? '' : 's'}`;
            document.getElementById('charCount').innerText = `${chars} character${chars === 1 ? '' : 's'}`;
            
            // Auto-resize logic
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        // Community Select Toggle Logic
        const commBtn = document.getElementById('communitySelect');
        const dropdown = commBtn.nextElementSibling;
        
        commBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('hidden');
        });

        document.addEventListener('click', () => {
            dropdown.classList.add('hidden');
        });

        // Micro-interactions for the editor
        const editor = document.getElementById('editor');
        editor.addEventListener('focus', () => {
            editor.parentElement.parentElement.classList.add('ring-2', 'ring-primary/10');
        });
        editor.addEventListener('blur', () => {
            editor.parentElement.parentElement.classList.remove('ring-2', 'ring-primary/10');
        });
    </script>
