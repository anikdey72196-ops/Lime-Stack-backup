<style>

<body class="bg-surface selection:bg-primary-container selection:text-on-primary-container">

</div>
<nav class="hidden md:flex items-center gap-6">
<a class="text-primary font-bold border-b-2 border-primary pb-1 font-body" href="#">Home</a>
</nav>
<div class="flex items-center gap-4" id="nav-auth-container">
    <!-- Content injected by JS based on login status -->
</div>
</header>
<div class="flex w-full justify-center min-h-screen">
<!-- SideNavBar -->
<aside class="hidden lg:flex flex-col items-end h-[calc(100vh-68px)] p-4 lg:py-6 lg:pr-8 border-r border-outline-variant/30 w-[320px] shrink-0 sticky top-[68px] bg-surface-container dark:bg-surface-container-lowest">
<div class="w-full flex flex-col h-full">
<div class="mb-8 px-4">

</div>
<nav class="flex flex-col gap-1 mb-8">
<a class="bg-primary-container text-on-primary-container rounded-xl font-bold px-4 py-3 flex items-center gap-3 active:opacity-80 transition-all duration-150" href="#">

<button onclick="window.location.href='new_post.html'" class="w-full bg-primary text-white py-4 px-6 rounded-xl font-bold font-body shadow-lg shadow-primary/20 hover:brightness-110 active:scale-95 transition-all">
                Create Post
            </button>
            </button>
</div>
</aside>
<!-- Main Feed Canvas -->
<main class="flex-1 px-4 py-6 md:px-8 max-w-5xl border-x border-outline-variant/10">
<!-- Posts Feed -->
<div id="posts-container" class="space-y-6">
    <p class="text-on-surface-variant text-center font-bold mt-10">Loading posts...</p>
</div>
</main>
<!-- Right Sidebar (Extra Context) -->
<aside class="hidden xl:flex flex-col h-[calc(100vh-68px)] py-8 pl-8 border-l border-outline-variant/30 w-[320px] shrink-0 sticky top-[68px] overflow-y-auto">
<div class="w-full flex flex-col h-full">

<a class="hover:underline" href="#">Content Policy</a>

</div>
</div>
</aside>
</div>
<!-- Mobile Bottom Navigation -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-surface shadow-[0_-4px_20px_rgba(0,0,0,0.05)] px-6 py-3 flex justify-between items-center z-50">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="text-[10px] font-bold">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined">explore</span>
<span class="text-[10px]">Explore</span>
</button>
<button class="w-12 h-12 bg-primary text-white rounded-full flex items-center justify-center shadow-lg -translate-y-6">
<span class="material-symbols-outlined">add</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="text-[10px]">Talk</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px]">Profile</span>
</button>
</nav>
<script>
        // Simple Interaction logic
        document.querySelectorAll('article').forEach(article => {
            article.addEventListener('mouseenter', () => {
                article.classList.add('transition-transform', 'duration-300');
            });
        });
        </script>
        <script src="api.js"></script>
    <script>
        // Search Bar Focus Effect
        const searchInput = document.querySelector('input[type="text"]');
        if(searchInput) {
            searchInput.addEventListener('focus', () => {
                searchInput.parentElement.classList.add('shadow-md');
            });
            searchInput.addEventListener('blur', () => {
                searchInput.parentElement.classList.remove('shadow-md');
            });
        }

        async function loadPosts() {
            const postsContainer = document.getElementById('posts-container');
            try {
                const data = await api.fetchPosts();
                if (!data.posts || data.posts.length === 0) {
                    postsContainer.innerHTML = '<p class="text-on-surface-variant text-center mt-10">No posts available.</p>';
                    return;
                }

                postsContainer.innerHTML = ''; 
                data.posts.forEach(post => {
                    const isAuthor = api.isLoggedIn() && String(post.user_id) === String(api.getUserId());
                    
                    const postHtml = `
                    <article class="bg-surface-container-lowest rounded-xl p-6 border border-outline-variant/10 shadow-sm hover:shadow-md transition-shadow duration-300">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-8 h-8 rounded-full bg-primary-fixed-dim flex items-center justify-center text-primary font-bold text-xs">${post.author ? post.author.substring(0,2).toUpperCase() : 'U'}</div>
                            <div>
                                <p class="text-sm font-bold flex items-center gap-2">
                                    u/${post.author || 'unknown'}
                                    <span class="text-[10px] text-on-surface-variant font-normal opacity-60">Posted on ${post.date_posted}</span>
                                </p>
                            </div>
                        </div>
                        <h2 class="font-headline text-2xl font-bold mb-3 text-on-surface leading-snug">${post.title}</h2>
                        <div class="font-body text-on-surface-variant mb-6 line-clamp-3 leading-relaxed markdown-content">
                            ${marked.parse(post.content || '')}
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-1 bg-surface-container-low rounded-full px-1">
                                <button class="p-2 hover:bg-primary-container/20 rounded-full text-on-surface-variant hover:text-primary transition-all">
                                    <span class="material-symbols-outlined">expand_less</span>
                                </button>
                                <span class="text-xs font-bold font-body px-1">0</span>
                                <button class="p-2 hover:bg-error-container/20 rounded-full text-on-surface-variant hover:text-error transition-all">
                                    <span class="material-symbols-outlined">expand_more</span>
                                </button>
                            </div>
                            <div class="flex items-center gap-4">
                                ${isAuthor ? `
                                <button onclick="window.location.href='edit_post.html?id=${post.id}'" class="flex items-center gap-2 text-primary hover:bg-primary/10 px-3 py-1.5 rounded-lg transition-colors text-sm font-bold">
                                    <span class="material-symbols-outlined text-lg">edit</span>
                                    Edit
                                </button>
                                <button onclick="deletePost(${post.id})" class="flex items-center gap-2 text-error hover:bg-error/10 px-3 py-1.5 rounded-lg transition-colors text-sm font-bold">
                                    <span class="material-symbols-outlined text-lg">delete</span>
                                    Delete
                                </button>
                                ` : ''}
                            </div>
                        </div>
                    </article>`;
                    postsContainer.insertAdjacentHTML('beforeend', postHtml);
                });
            } catch (err) {
                postsContainer.innerHTML = `<p class="text-error text-center mt-10">Error loading posts: ${err.message}</p>`;
            }
        }

        async function deletePost(id) {
            if(!confirm("Are you sure you want to delete this post?")) return;
            try {
                await api.deletePost(id);
                loadPosts();
            } catch (err) {
                alert("Could not delete post: " + err.message);
            }
        }

        function updateNavAuth() {
            const authContainer = document.getElementById('nav-auth-container');
            if (api.isLoggedIn()) {
                authContainer.innerHTML = `
                    <button onclick="window.location.href='account.html'" class="p-2 rounded-full hover:bg-surface-variant/50 transition-colors duration-200 active:scale-95 transition-transform text-on-surface-variant">
                    <span class="material-symbols-outlined">person</span>
                    </button>
                    <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary/20">
                        <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmUGiUeopbjCyGQv4xhoGYF2matRlfcXvVowKOivAvQqxeZ57ym5uJiQCraLUy64cRqgxL7V4qr3zOYR8YPfzAZQJtaeco133OPitJGGUQFPvyJK3c0YRUJKKw_AT3KtK_RQTvP5-SJq3BHbZRjeJJE5sc7ELfMxF7dgCF2XzFjRZImg3XHwwOKnchzEldbVs8d9iJ0Gy8NffC8CgQMFF1vor9ThQemYWOrd7mdvWYFaA-YP7emrDYWwMBzZizMHzHnYNbaNKbllU"/>
                    </div>
                `;
            } else {
                authContainer.innerHTML = `
                    <button onclick="window.location.href='auth.html'" class="bg-primary text-white px-4 py-2 rounded-xl font-bold font-body shadow-sm hover:brightness-110 active:scale-95 transition-all text-sm">
                        Login / Register
                    </button>
                `;
            }
        }

        updateNavAuth();
        loadPosts();
    </script>
</body></html>
