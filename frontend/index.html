<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - My API App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="brutalist-nav">
        <h2>Lime Stack API</h2>
        <div id="auth-links">
            <a href="auth.html" class="general-btn nav-btn">Login / Register</a>
        </div>
        <div id="user-links" class="hidden">
            <a href="index.html" class="general-btn nav-btn">Home</a>
            <a href="new_post.html" class="general-btn nav-btn">New Post</a>
            <a href="#" onclick="logout()" class="general-btn nav-btn">Logout</a>
        </div>
    </nav>

    <div class="container" id="posts-container">
        <h1 class="page-title">Community Posts</h1>
        <div id="posts-list">
            <p style="font-weight: 600;">Loading posts...</p>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        async function loadPosts() {
            const postsList = document.getElementById('posts-list');
            try {
                const data = await api.fetchPosts();
                if (data.posts.length === 0) {
                    postsList.innerHTML = '<p>No posts available.</p>';
                    return;
                }

                postsList.innerHTML = ''; // clear loading
                data.posts.forEach(post => {
                    const postEl = document.createElement('div');
                    postEl.className = 'post-card flip-card__front'; // borrow flip-card styling for posts
                    postEl.style.position = 'relative';
                    postEl.style.width = '100%';
                    postEl.style.height = 'auto';
                    postEl.style.alignItems = 'flex-start';
                    postEl.style.textAlign = 'left';
                    postEl.style.padding = '30px';
                    
                    postEl.innerHTML = `
                        <div class="post-title" style="margin: 0 0 15px 0; text-align: left; font-size: 22px;">${post.title}</div>
                        <div class="post-content" style="color: var(--main-color); font-weight: 500;">${post.content}</div>
                        <small style="color: var(--font-color-sub); margin-top: 20px; display: block; font-weight: 600;">Posted on: ${post.date_posted || 'Unknown'}</small>
                        ${api.isLoggedIn() ? `<button onclick="deletePost(${post.id})" class="general-btn" style="background-color: #ff6b6b; color: white; width: auto; padding: 0 15px; margin-bottom: 0; margin-top: 20px;">Delete</button>` : ''}
                    `;
                    postsList.appendChild(postEl);
                });
            } catch (err) {
                postsList.innerHTML = `<p style="color: red;">Error loading posts: ${err.message}</p>`;
            }
        }

        async function deletePost(id) {
            if(!confirm("Are you sure you want to delete this post?")) return;
            try {
                await api.deletePost(id);
                alert("Post deleted!");
                loadPosts(); // refresh list
            } catch (err) {
                alert("Could not delete post: " + err.message);
            }
        }

        // Initialize
        loadPosts();
    </script>
</body>
</html>
